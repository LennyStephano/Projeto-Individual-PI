<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Gunners | Cadastro</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="icon" href="./assets/icon/favicon2.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>
  <div class="header">
    <div class="container">
      <h1 class="titulo">Gunners</h1>
      <ul class="navbar">
        <li>
          <a href="index.html">Inicial</a>
        </li>
        <li>|</li>
        <li>
          <a href="login.html">Login</a>
        </li>
        <li class="agora">
          <a href="#">Cadastro</a>
        </li>
      </ul>
    </div>
  </div>

  <div class="login">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <div id="mensagem_erro"></div>
      </div>
    </div>
    <div class="container">
      <div class="card card-cadastro">
        <h2>Welcome to the Jungle!</h2>
        <div class="formulario">
          <div class="campo">
            <b>Nome:</b>
            <input id="nome_input" type="text" placeholder="Nome" />
          </div>
          <div class="campo">
            <b>E-mail:</b>
            <input id="email_input" type="text" placeholder="E-mail" />
          </div>
          <div class="campo">
            <b>Senha:</b>
            <input id="senha_input" type="password" placeholder="Senha" />
          </div>
          <div class="campo">
            <b>Confirmação da Senha:</b>
            <input id="confirmacao_senha_input" type="password" placeholder="Senha" />
          </div>
          
          <div class="campo">
            <b>Membro Favorito:</b>
            <select id="membro_favorito_input">
              <option value="" disabled selected>Selecione um membro</option>
              <option value="1">Axl Rose</option>
              <option value="2">Slash</option>
              <option value="3">Duff McKagan</option>
              <option value="4">Izzy Stradlin</option>
              <option value="5">Steven Adler</option>
            </select>
          </div>

          <div class="campo">
            <b>Já conhece a banda?</b>
            <select id="conhece_banda_input">
              <option value="" disabled selected>Selecione uma opção</option>
              <option value="S">Sim</option>
              <option value="N">Não</option>
            </select>
          </div>

          <div class="campo">
            <b>Desafio de Segurança: Quanto é <b id="span_numero_desafio" style="color: #e50914; font-weight: bold;"></b> * 10?</b>
            <input id="desafio_binario_input" type="text" placeholder="50" />
          </div>

          <button class="botao" onclick="cadastrar()">Cadastrar</button>
        </div>
        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="container">
      <h4>Feito com muito rock SPTech &copy; 2026</h4>
    </div>
  </div>

</body>

</html>

<script>
  var numeroDesafio = Math.floor(Math.random() * 15) + 1; 
  var numeroBinario = numeroDesafio.toString(2);
  document.getElementById("span_numero_desafio").innerHTML = numeroDesafio;

  function cadastrar() {
    var nomeVar = nome_input.value;
    var emailVar = email_input.value;
    var senhaVar = senha_input.value;
    var confirmacaoSenhaVar = confirmacao_senha_input.value;
    var membroFavoritoVar = membro_favorito_input.value;
    var conheceBandaVar = conhece_banda_input.value;
    var desafioBinarioVar = desafio_binario_input.value;

    var campos = [nomeVar, emailVar, senhaVar, confirmacaoSenhaVar, membroFavoritoVar, conheceBandaVar, desafioBinarioVar];
    var temCampoVazio = false;

    for (var i = 0; i < campos.length; i++) {
      if (campos[i] == "") {
        temCampoVazio = true;
        break;
      }
    }

    if (temCampoVazio) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML =
        "Por favor, preencha todos os campos!";
      setTimeout(sumirMensagem, 5000);
      return false;
    } 

    if (senhaVar != confirmacaoSenhaVar) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "As senhas não conferem!";
      setTimeout(sumirMensagem, 5000);
      return false;
    }

    var respostaEmBinario = (Number(desafioBinarioVar) / 10).toString(2);
    if (respostaEmBinario !== numeroBinario) {
      cardErro.style.display = "block";
      mensagem_erro.innerHTML = "O valor informado está incorreto!";
      setTimeout(sumirMensagem, 5000);
      return false;
    }

    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
        membroFavoritoServer: membroFavoritoVar,
        conheceBandaServer: conheceBandaVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
