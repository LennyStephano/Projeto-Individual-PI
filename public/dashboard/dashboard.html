<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gunners | Dashboard</title>

    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <script src="../js/sessao.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

 
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

   
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        .kpi-container {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 20px;
        }

        .kpi-card {
            background-color: #1a1a1a;
            color: #fff;
            padding: 25px;
            border-radius: 4px;
            text-align: center;
            width: 45%;
            border-bottom: 2px solid #e50914;
        }

        .kpi-title {
            font-size: 1rem;
            margin-bottom: 10px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .kpi-value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #fff;
        }

        .graph {
            max-width: 700px;
            margin: 0 auto;
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 8px;
        }

       
        .sidebar-img {
            width: 90%;
            max-width: 240px;
            border-radius: 10px;
            border: 3px solid #e50914;
            object-fit: cover;
            box-shadow: 0 4px 20px rgba(229, 9, 20, 0.4);
        }

       
        .hello h3 {
            font-size: 1.8rem !important;
            font-weight: 400 !important;
            text-align: center;
            margin: 0;
            padding: 0 10px;
        }

        .hello h3 span {
            font-weight: 800 !important;
            font-size: 2rem;
            display: block;
            margin-top: 8px;
        }

       
        .header-left {
            justify-content: flex-start !important;
            padding-top: 40px;
            gap: 35px;
        }

        .header-left h1 {
            font-size: 3.2rem;
            margin-bottom: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

     
        .sidebar-bottom {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            padding-bottom: 40px;
        }

        .sidebar-bottom .btn-nav {
            width: 80%;
            padding: 16px 0;
            font-size: 1.2rem;
        }

        .sidebar-bottom .btn-nav h3 {
            font-size: 1.3rem;
        }

        .sidebar-bottom .btn-logout {
            width: 80%;
            padding: 16px 0;
            margin-bottom: 0;
            font-size: 1.2rem;
            text-align: center;
        }

        .sidebar-bottom .btn-logout h3 {
            font-size: 1.3rem;
        }


    </style>
</head>

<body onload="carregarDashboard()">

    <div class="janela">
        <div class="header-left">
            <h1>Gunners</h1>

            <img src="../assets/imgs/guns_dashboard.jpg"
                 alt="Guns N' Roses" class="sidebar-img">

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="sidebar-bottom">
                <div class="btn-nav">
                    <h3>Dashboard</h3>
                </div>

                <div class="btn-nav" onclick="window.location.href='quiz.html'" style="cursor:pointer;">
                    <h3>🎸 Quiz</h3>
                </div>



                <div class="btn-logout" onclick="limparSessao()">
                    <h3>Sair</h3>
                </div>
            </div>

        </div>

        <div class="dash">
            <h2 style="color: white; margin-bottom: 20px;">Estatísticas dos membros</h2>

            <div class="kpi-container">
                <div class="kpi-card">
                    <div class="kpi-title">Membro mais escolhido como favorito</div>
                    <div class="kpi-value" id="kpi_membro">Carregando...</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-title">Pessoas que já conheciam a banda</div>
                    <div class="kpi-value" id="kpi_conhecimento">0%</div>
                </div>
            </div>

            <div id="graficos">
                <div class="graph">
                    <canvas id="myChartCanvas"></canvas>
                </div>
            </div>

        </div>
    </div>



</body>

</html>

<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;

    function carregarDashboard() {
        carregarKpis();
        carregarGrafico();
    }

    function carregarKpis() {
        fetch("/dashboard/kpis").then(function (resposta) {
            if (resposta.ok) {
                resposta.json().then(function (respostaJson) {
                    console.log("Dados recebidos dos KPIs: ", JSON.stringify(respostaJson));

                    document.getElementById("kpi_membro").innerHTML = respostaJson.membroMaisVotado;
                    document.getElementById("kpi_conhecimento").innerHTML = respostaJson.porcentagemConhecimento + "%";
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados dos kpis: ${error.message}`);
            });
    }

    function carregarGrafico() {
        fetch("/dashboard/dados-membros").then(function (resposta) {
            if (resposta.ok) {
                resposta.json().then(function (respostaJson) {
                    console.log(`Dados recebidos para o gráfico: ${JSON.stringify(respostaJson)}`);
                    plotarGrafico(respostaJson);
                });
            } else {
                console.error('Nenhum dado encontrado ou erro na API');
            }
        })
            .catch(function (error) {
                console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
            });
    }

    function plotarGrafico(resposta) {
        console.log('Iniciando plotagem do gráfico...');

        let labels = [];
        let data = [];

        for (i = 0; i < resposta.length; i++) {
            var registro = resposta[i];
            labels.push(registro.membro_favorito);
            data.push(registro.votos);
        }

        let dados = {
            labels: labels,
            datasets: [{
                label: 'Votos',
                data: data,
                backgroundColor: [
                    'rgba(229, 9, 20, 0.8)',
                    'rgba(255, 206, 86, 0.8)',
                    'rgba(54, 162, 235, 0.8)',
                    'rgba(75, 192, 192, 0.8)',
                    'rgba(153, 102, 255, 0.8)'
                ],
                borderColor: [
                    'rgba(229, 9, 20, 1)',
                    'rgba(255, 206, 86, 1)',
                    'rgba(54, 162, 235, 1)',
                    'rgba(75, 192, 192, 1)',
                    'rgba(153, 102, 255, 1)'
                ],
                borderWidth: 2
            }]
        };

        const config = {
            type: 'pie',
            data: dados,
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        display: true,
                        position: 'bottom',
                        labels: {
                            color: 'white',
                            font: { size: 16 },
                            padding: 24
                        }
                    },
                    title: {
                        display: true,
                        text: 'Qual membro a galera mais curte?',
                        color: 'white',
                        font: {
                            size: 22
                        },
                        padding: {
                            bottom: 20
                        }
                    }
                }
            }
        };

        let myChart = new Chart(
            document.getElementById(`myChartCanvas`),
            config
        );
    }

</script>
