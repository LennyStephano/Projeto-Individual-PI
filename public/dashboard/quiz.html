<!DOCTYPE html>
<html lang="pt-br">

<head>
    <link rel="shortcut icon" href="../assets/icon/favicon2.ico" type="image/x-icon">
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gunners | Quiz</title>

    <link rel="stylesheet" href="./../css/dashboards.css">
    <link rel="stylesheet" href="./../css/estilo.css" />
    <link rel="stylesheet" href="./../css/quiz.css" />
    <script src="../js/sessao.js"></script>

    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <script src="https://kit.fontawesome.com/9f7414eb10.js" crossorigin="anonymous"></script>

    <style>
        .sidebar-img {
            width: 90%;
            max-width: 240px;
            border-radius: 10px;
            border: 3px solid #e50914;
            object-fit: cover;
            box-shadow: 0 4px 20px rgba(229, 9, 20, 0.4);
        }

        .hello h3 {
            font-size: 1.8rem !important;
            font-weight: 400 !important;
            text-align: center;
            margin: 0;
            padding: 0 10px;
        }

        .hello h3 span {
            font-weight: 800 !important;
            font-size: 2rem;
            display: block;
            margin-top: 8px;
        }

        .header-left {
            justify-content: flex-start !important;
            padding-top: 40px;
            gap: 35px;
        }

        .header-left h1 {
            font-size: 3.2rem;
            margin-bottom: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .sidebar-bottom {
            margin-top: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            width: 100%;
            padding-bottom: 40px;
        }

        .sidebar-bottom .btn-nav {
            width: 80%;
            padding: 16px 0;
            font-size: 1.2rem;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .sidebar-bottom .btn-nav h3 {
            font-size: 1.3rem;
        }

        .sidebar-bottom .btn-logout {
            width: 80%;
            padding: 16px 0;
            margin-bottom: 0;
            font-size: 1.2rem;
            text-align: center;
        }

        .sidebar-bottom .btn-logout h3 {
            font-size: 1.3rem;
        }

        .quiz-page-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px;
        }

        .quiz-page-content h2 {
            color: #fff;
            font-size: 2rem;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .quiz-page-content .quiz-subtitle {
            color: #888;
            font-size: 1rem;
            margin-bottom: 32px;
        }

        .quiz-container {
            width: 100%;
            max-width: 500px;
            background-color: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            overflow: hidden;
        }

        .quiz-container .quiz-header {
            border-radius: 0;
        }

        .quiz-container .quiz-body {
            min-height: 280px;
        }
    </style>
</head>

<body>

    <div class="janela">
        <div class="header-left">
            <h1>Gunners</h1>

            <img src="https://i.pinimg.com/736x/84/ae/13/84ae134253079bfc3b38d9f0304af0ec.jpg"
                 alt="Guns N' Roses" class="sidebar-img">

            <div class="hello">
                <h3>Olá, <span id="b_usuario">usuário</span>!</h3>
            </div>

            <div class="sidebar-bottom">
                <div class="btn-nav" onclick="window.location.href='dashboard.html'">
                    <h3>Dashboard</h3>
                </div>

                <div class="btn-nav" style="background-color: #b8070f;">
                    <h3>Quiz</h3>
                </div>

                <div class="btn-logout" onclick="limparSessao()">
                    <h3>Sair</h3>
                </div>
            </div>

        </div>

        <div class="dash">
            <div class="quiz-page-content">
                <h2>🎸 Quiz Guns N' Roses</h2>
                <p class="quiz-subtitle">Teste seus conhecimentos sobre a banda!</p>

                <div class="quiz-container">
                    <div class="quiz-header">
                        <h3>Pergunta</h3>
                    </div>
                    <div class="quiz-body" id="quizBody">
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>

</html>

<script>
    b_usuario.innerHTML = sessionStorage.NOME_USUARIO;
</script>
<script src="../js/quiz.js"></script>
<script>
    // Iniciar o quiz ao carregar a página
    renderizarQuiz();
</script>
